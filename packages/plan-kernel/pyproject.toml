[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "plan-kernel"
version = "0.1.0"
description = "Jupyter kernel for the PLAN virtual machine — type Plan Asm in a cell, see the reduced PLAN value back."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Neal Davis", email = "davisneale@gmail.com" },
]
keywords = ["plan", "jupyter", "kernel", "ipykernel", "gallowglass"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: IPython",
    "Framework :: Jupyter",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Education",
    "Topic :: Software Development :: Interpreters",
]
dependencies = [
    "ipykernel>=6.0",
    "marduk",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://github.com/sigilante/marduk"
Repository = "https://github.com/sigilante/marduk"

[tool.setuptools.packages.find]
include = ["plan_kernel*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
