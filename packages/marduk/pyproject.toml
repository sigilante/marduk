[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "marduk"
version = "0.1.0"
description = "Standalone Python runtime for the PLAN virtual machine. Spec-faithful core, BPLAN op coverage, optional jet overlay."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Neal Davis", email = "davisneale@gmail.com" },
]
keywords = ["plan", "bplan", "interpreter", "runtime"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Interpreters",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://github.com/sigilante/marduk"
Repository = "https://github.com/sigilante/marduk"

[tool.setuptools.packages.find]
include = ["marduk*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
